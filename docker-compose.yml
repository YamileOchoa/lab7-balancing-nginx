services:
  backend1:
    build: ./backend
    container_name: backend1
    environment:
      - PORT=8081
      - INSTANCE_ID=A
    depends_on:
      - db

  backend2:
    build: ./backend
    container_name: backend2
    environment:
      - PORT=8082
      - INSTANCE_ID=B
    depends_on:
      - db

  backend3:
    build: ./backend
    container_name: backend3
    environment:
      - PORT=8083
      - INSTANCE_ID=C
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: nginx_lb
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend1
      - backend2
      - backend3

  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: lab7db
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql